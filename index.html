<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Story Flower Garden</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Story Flower Garden 🌸</h1>

<div class="panel">

<input id="email" placeholder="Your Email">

<input id="color" type="color">

<br>

<textarea id="story" placeholder="Write your story"></textarea>

<br>

<button onclick="createFlower()">Create Flower</button>

</div>


<div class="panel">

<input id="searchEmail" placeholder="Search your email">

<button onclick="searchFlower()">Find</button>

</div>

<div class="panel">
  <h3>Manage Flowers 🌱</h3>
  <button onclick="clearAllFlowers()">Clear All Flowers</button>
  <br><br>
  <input id="deleteEmail" placeholder="Email to delete">
  <button onclick="deleteFlowerByEmail()">Delete by Email</button>
</div>

<canvas id="garden" width="900" height="600"></canvas>


<div id="popup">

<div id="popupBox">

<h2>Welcome 🌸</h2>

<p>
Write a story and create a flower.<br>
Every flower holds someone's memory.
</p>

<button onclick="closePopup()">Start</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
