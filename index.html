<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Story Flower Garden</title>

<style>

body{
font-family:sans-serif;
text-align:center;
background:#f6f6f6;
}

canvas{
border:1px solid #ccc;
margin-top:20px;
}

textarea{
width:300px;
height:80px;
}

#popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:flex;
justify-content:center;
align-items:center;
}

#popupBox{
background:white;
padding:30px;
border-radius:10px;
}

</style>

</head>

<body>

<h1>Story Flower Garden 🌸</h1>

<div>

<input id="email" placeholder="Your Email">

<input id="color" type="color">

<br><br>

<textarea id="story" placeholder="Write your story"></textarea>

<br><br>

<button id="createFlower">Create Flower</button>

</div>

<br>

<div>

<input id="searchEmail" placeholder="Search your email">

<button id="searchFlower">Find My Flower</button>

</div>

<canvas id="garden" width="900" height="600"></canvas>

<div id="popup">

<div id="popupBox">

<h2>Welcome 🌸</h2>

<p>
Write a story and choose a color.<br>
Your story will become a flower.
</p>

<button onclick="closePopup()">Start</button>

</div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
